services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: wins_order_book
      MYSQL_USER: wins
      MYSQL_PASSWORD: wins
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    environment:
      DATABASE_URL: mysql+pymysql://wins:wins@mysql:3306/wins_order_book?charset=utf8mb4
      JWT_SECRET: ${JWT_SECRET:-local-development-secret-change-before-production}
      FRONTEND_ORIGIN: http://localhost:5173
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
  frontend_node_modules: